<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Viewport: maximum-scale=1 stops iOS Safari auto-zooming on input focus
         and keeps the page at 100% zoom after rotation (pinch-zoom still works
         on iOS 10+, which ignores the cap for user gestures) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

    <!-- Title -->
    <title>TempWorks | Temporary Works Design Toolkit</title>

    <!-- SEO -->
    <meta name="description" content="Professional Toolkit for Temporary Works Engineer" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph -->
    <meta property="og:title" content="TempWorks | Temporary Works Design Toolkit" />
    <meta property="og:description" content="Professional Toolkit for Temporary Works Engineer" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Script loading fail-safe to handle stale index cache on redeploy -->
    <script>
      window.addEventListener('error', function(e) {
        var isScript = e.target && e.target.tagName === 'SCRIPT';
        var isSyntax = e.message && (
          e.message.indexOf('Unexpected token') > -1 || 
          e.message.indexOf('expected expression') > -1 ||
          e.message.indexOf('import') > -1
        );
        if (isScript || isSyntax) {
          try {
            var reloadKey = 'tw_stale_reload_attempted';
            if (!sessionStorage.getItem(reloadKey)) {
              sessionStorage.setItem(reloadKey, '1');
              window.location.reload(true);
            }
          } catch(err) {}
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
